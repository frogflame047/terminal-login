<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="ROBCO INDUSTRIES UNIFIED OPERATING SYSTEM">
    <meta property="og:description" content="WARNING: VERY HARD SECURITY LOCKOUT IMMINENT.">
    <meta property="og:color" content="#dc143c">
    
    <title>Very Hard Terminal Access</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --terminal-color: #1ae23b; /* Default RobCo Green */
            --bg-color: #080a08;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--terminal-color);
            font-family: 'VT323', 'Fixedsys', monospace;
            height: 100%;
            overflow: hidden;
            text-transform: uppercase;
            user-select: none;
        }

        /* Thematic CRT Scanlines */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #terminal-container {
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 3;
            text-shadow: 0 0 5px var(--terminal-color);
            font-size: 1.3rem;
        }

        /* Faction Theme Selector */
        #theme-selector {
            position: absolute;
            top: 1rem;
            right: 2rem;
            z-index: 11;
            display: flex;
            gap: 10px;
        }
        
        .theme-btn {
            background: none;
            border: 1px solid var(--terminal-color);
            color: var(--terminal-color);
            font-family: inherit;
            cursor: pointer;
            padding: 2px 5px;
            text-transform: uppercase;
        }
        .theme-btn:hover { background: var(--terminal-color); color: var(--bg-color); }

        .header { margin-bottom: 1.5rem; }
        .attempts { margin-bottom: 1rem; letter-spacing: 2px; }
        
        #game-area { display: flex; gap: 3rem; }

        .column {
            flex: 1;
            line-height: 1.3;
            letter-spacing: 2px;
            white-space: pre;
        }

        /* Interactive Elements */
        .word { cursor: pointer; transition: 0s; }
        .word:hover:not(.dud) { background-color: var(--terminal-color); color: var(--bg-color); }
        .dud { opacity: 0.5; pointer-events: none; }

        .bracket { cursor: pointer; }
        .bracket:hover { background-color: var(--terminal-color); color: var(--bg-color); }

        #output-log {
            margin-top: 2rem;
            border-top: 1px solid var(--terminal-color);
            padding-top: 1rem;
            height: 120px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .log-entry { margin: 0; }
        
        /* Lockout Screen */
        #lockout-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            z-index: 20;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            font-size: 2rem;
            text-shadow: 0 0 10px var(--terminal-color);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div id="theme-selector">
    <button class="theme-btn" onclick="setTheme('#1ae23b')">ROBCO</button>
    <button class="theme-btn" onclick="setTheme('#dc143c')">IMPERIAL</button>
    <button class="theme-btn" onclick="setTheme('#0078d7')">BOS</button>
    <button class="theme-btn" onclick="setTheme('#e6b800')">NCR</button>
</div>

<div id="lockout-screen">
    <div>TERMINAL LOCKED</div>
    <div>PLEASE CONTACT ADMINISTRATOR</div>
    <div id="lockout-timer" style="margin-top: 20px;"></div>
</div>

<div id="terminal-container">
    <div class="header">
        ROBCO INDUSTRIES UNIFIED OPERATING SYSTEM<br>
        COPYRIGHT 2075-2077 ROBCO INDUSTRIES<br>
        -Server 1-<br><br>
        Protocol Override: VERY HARD<br>
        Enter Password Now
    </div>

    <div class="attempts" id="attempts-display"></div>

    <div id="game-area">
        <div class="column" id="col1"></div>
        <div class="column" id="col2"></div>
    </div>

    <div id="output-log" id="log-container"></div>
</div>

<script>
    // --- CONFIGURATION ---
    const GOOGLE_DOC_URL = "docs.google.com/document/d/1SpwUkogPndLPmBVoenjBhuyWh3374QWAE_WDTTnYNWw"; 
    
    // 20 words, exact 12-char length for VERY HARD lock. 
    const wordPool = [
        "BROTHERHOODS", "PRESERVATION", "CONSERVATION", "TRANSMISSION", "ASSIMILATION",
        "CATASTROPHIC", "TECHNOLOGIES", "CIVILIZATION", "ANNIHILATION", "REGENERATION",
        "ILLUMINATING", "PURIFICATION", "CONSTRUCTION", "MODIFICATION", "PACIFICATION",
        "INDEPENDENCE", "APPRECIATION", "INTERFERENCE", "OVERWHELMING", "RADIOLOGICAL"
    ];
    
    const GIBBERISH_CHARS = "!@#$%^&*()_+-=[]{}|;':\",./<>?";
    const BRACKET_PAIRS = { '(': ')', '[': ']', '{': '}', '<': '>' };
    
    let attempts = 4;
    let logs = ["> AWAITING INPUT..."];
    let password = "";
    let wordsOnBoard = [];
    let lockoutInterval;

    // Faction Themes
    function setTheme(hex) {
        document.documentElement.style.setProperty('--terminal-color', hex);
    }

    // --- LOCKOUT LOGIC ---
    function checkLockout() {
        const lockoutTime = localStorage.getItem('terminalLockout');
        if (lockoutTime) {
            const timeRemaining = parseInt(lockoutTime) - Date.now();
            if (timeRemaining > 0) {
                enforceLockout(timeRemaining);
                return true;
            } else {
                localStorage.removeItem('terminalLockout');
            }
        }
        return false;
    }

    function enforceLockout(msLeft) {
        document.getElementById('terminal-container').style.display = 'none';
        document.getElementById('lockout-screen').style.display = 'flex';
        
        clearInterval(lockoutInterval);
        lockoutInterval = setInterval(() => {
            const left = parseInt(localStorage.getItem('terminalLockout')) - Date.now();
            if (left <= 0) {
                clearInterval(lockoutInterval);
                localStorage.removeItem('terminalLockout');
                location.reload(); // Refresh when timer ends
            } else {
                const mins = Math.floor(left / 60000);
                const secs = Math.floor((left % 60000) / 1000).toString().padStart(2, '0');
                document.getElementById('lockout-timer').innerText = `TIMEOUT: ${mins}:${secs}`;
            }
        }, 1000);
    }

    function triggerFailLockout() {
        const lockoutMs = 5 * 60 * 1000; // 5 minutes
        localStorage.setItem('terminalLockout', Date.now() + lockoutMs);
        enforceLockout(lockoutMs);
    }

    // --- GAME ENGINE ---
    function updateAttempts() {
        let blocks = "";
        for(let i=0; i<attempts; i++) blocks += "&#9608; ";
        document.getElementById('attempts-display').innerHTML = `${attempts} ATTEMPT(S) LEFT: ${blocks}`;
    }

    function addLog(text) {
        logs.push(text);
        if (logs.length > 5) logs.shift();
        const logHtml = logs.map(l => `<div class="log-entry">${l}</div>`).join('');
        document.getElementById('output-log').innerHTML = logHtml;
    }

    function generateBoard() {
        // Shuffle and pick 15 words
        wordsOnBoard = wordPool.sort(() => 0.5 - Math.random()).slice(0, 15);
        password = wordsOnBoard[Math.floor(Math.random() * wordsOnBoard.length)];
        
        // 34 lines, 16 characters per line = 544 slots
        let slots = new Array(544).fill(null);
        
        // Insert words randomly
        wordsOnBoard.forEach(word => {
            let placed = false;
            while(!placed) {
                let idx = Math.floor(Math.random() * (544 - 12));
                // Prevent crossing a line boundary (16 chars per line)
                let row = Math.floor(idx / 16);
                let rowEnd = Math.floor((idx + 11) / 16);
                
                if (row === rowEnd) {
                    // Check if space is empty
                    let isFree = true;
                    for(let i=0; i<12; i++) { if(slots[idx + i] !== null) isFree = false; }
                    
                    if(isFree) {
                        for(let i=0; i<12; i++) slots[idx+i] = { type: 'word', char: word[i], wordId: word };
                        placed = true;
                    }
                }
            }
        });

        // Fill remaining with gibberish
        for(let i=0; i<544; i++) {
            if(slots[i] === null) {
                slots[i] = { type: 'gibberish', char: GIBBERISH_CHARS[Math.floor(Math.random() * GIBBERISH_CHARS.length)] };
            }
        }

        // Inject functional brackets
        for(let line=0; line<34; line++) {
            let start = line * 16;
            let gibberishStreak = [];
            
            for(let i=start; i<start+16; i++) {
                if(slots[i].type === 'gibberish') {
                    gibberishStreak.push(i);
                } else {
                    if(gibberishStreak.length >= 3 && Math.random() > 0.4) createBracket(slots, gibberishStreak);
                    gibberishStreak = [];
                }
            }
            if(gibberishStreak.length >= 3 && Math.random() > 0.4) createBracket(slots, gibberishStreak);
        }

        renderBoard(slots);
    }

    function createBracket(slots, streakArr) {
        // Pick random start and end within the streak
        let bLen = Math.floor(Math.random() * (streakArr.length - 1)) + 2;
        let openKeys = Object.keys(BRACKET_PAIRS);
        let openChar = openKeys[Math.floor(Math.random() * openKeys.length)];
        let closeChar = BRACKET_PAIRS[openChar];
        
        let startIdx = streakArr[0];
        let endIdx = streakArr[bLen - 1];
        let bracketId = 'b_' + Math.random().toString(36).substr(2, 9);

        slots[startIdx].char = openChar;
        slots[startIdx].bracketRole = 'open';
        slots[endIdx].char = closeChar;
        slots[endIdx].bracketRole = 'close';

        for(let i=startIdx; i<=endIdx; i++) {
            slots[i].bracketId = bracketId;
        }
    }

    function escapeHTML(str) {
        return str.replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function renderBoard(slots) {
        let col1 = document.getElementById('col1');
        let col2 = document.getElementById('col2');
        let currentHtml = "";
        
        let activeWord = null;
        let activeBracket = null;

        for(let i=0; i<544; i++) {
            // Hex memory address
            if(i % 16 === 0) {
                if(i !== 0) currentHtml += "<br>";
                currentHtml += "0x" + Math.floor(Math.random() * 65535).toString(16).toUpperCase().padStart(4, '0') + " ";
            }

            let slot = slots[i];

            // Handle Word Rendering
            if (slot.type === 'word') {
                if(activeWord !== slot.wordId) {
                    currentHtml += `<span class="word" data-word="${slot.wordId}" onclick="guessWord('${slot.wordId}')">`;
                    activeWord = slot.wordId;
                }
                currentHtml += escapeHTML(slot.char);
                // Close word if it's the last letter or line ends
                if (i === 543 || slots[i+1]?.wordId !== activeWord) {
                    currentHtml += `</span>`;
                    activeWord = null;
                }
            } 
            // Handle Bracket Rendering
            else if (slot.bracketId) {
                if(activeBracket !== slot.bracketId) {
                    currentHtml += `<span class="bracket" onclick="useBracket(this)">`;
                    activeBracket = slot.bracketId;
                }
                currentHtml += escapeHTML(slot.char);
                if (i === 543 || slots[i+1]?.bracketId !== activeBracket) {
                    currentHtml += `</span>`;
                    activeBracket = null;
                }
            } 
            // Handle plain gibberish
            else {
                currentHtml += escapeHTML(slot.char);
            }

            // Distribute to columns
            if(i === 271) {
                col1.innerHTML = currentHtml;
                currentHtml = "";
            }
        }
        col2.innerHTML = currentHtml;
    }

    // --- INTERACTION LOGIC ---
    window.guessWord = function(guess) {
        let likeness = 0;
        for(let i=0; i<12; i++) { if(guess[i] === password[i]) likeness++; }
        
        if(guess === password) {
            addLog(`> ${guess}`);
            addLog("> EXACT MATCH!");
            addLog("> ACCESS GRANTED.");
            setTimeout(() => { window.location.href = GOOGLE_DOC_URL; }, 1500);
            return;
        }

        attempts--;
        addLog(`> ${guess}`);
        addLog(`> Entry denied.`);
        addLog(`> Likeness=${likeness}`);
        updateAttempts();

        if (attempts <= 0) {
            addLog("> SECURITY LOCKOUT INITIATED.");
            setTimeout(triggerFailLockout, 1000);
        }
    }

    window.useBracket = function(el) {
        if(el.dataset.used === 'true') return;
        el.dataset.used = 'true';
        el.style.pointerEvents = 'none';

        // 20% chance to restore tries, 80% chance to remove dud
        if(Math.random() < 0.20 && attempts < 4) {
            attempts = 4;
            updateAttempts();
            addLog("> Tries Reset.");
        } else {
            let activeWords = Array.from(document.querySelectorAll('.word:not(.dud)'));
            let duds = activeWords.filter(w => w.dataset.word !== password);
            
            if(duds.length > 0) {
                let toRemove = duds[Math.floor(Math.random() * duds.length)];
                toRemove.innerHTML = '.'.repeat(12);
                toRemove.classList.add('dud');
                addLog("> Dud removed.");
            } else {
                addLog("> Error: No duds found.");
            }
        }
    }

    // Initialize Game
    if (!checkLockout()) {
        updateAttempts();
        generateBoard();
        addLog("> INITIALIZED...");
    }
</script>

</body>
</html>
